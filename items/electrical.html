<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electrical &mdash; RustWiki</title>
<meta name="description" content="All electrical in Rust — descriptions, crafting costs, and detailed information.">
<link rel="stylesheet" href="../css/style.css">
<style>
  .item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  .item-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px 12px;text-align:center;cursor:pointer;transition:all .2s;text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:center;gap:8px}
  .item-card:hover{border-color:var(--accent);background:var(--bg-card-hover);transform:translateY(-2px)}
  .item-card img{width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3))}
  .item-card .item-label{font-family:var(--font-heading);font-size:13px;font-weight:600;color:var(--text-primary);line-height:1.2}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:modalIn .25s ease}
  @keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
  .modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text-muted);font-size:24px;cursor:pointer;z-index:1;line-height:1;padding:4px 8px;border-radius:4px;transition:all .15s}
  .modal-close:hover{color:var(--accent);background:var(--bg-secondary)}
  .modal-header{display:flex;align-items:center;gap:20px;padding:28px 28px 0;border-bottom:1px solid var(--border);padding-bottom:20px}
  .modal-header img{width:100px;height:100px;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
  .modal-header-text h2{font-family:var(--font-heading);font-size:22px;color:var(--text-primary);margin:0}
  .modal-header-text .item-type{font-family:var(--font-condensed);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-top:4px}
  .modal-header-text .item-desc{font-size:13px;color:var(--text-muted);margin-top:8px;line-height:1.5}
  .modal-body{padding:20px 28px 28px}
  .modal-section-title{font-family:var(--font-condensed);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:10px;margin-top:20px}
  .modal-section-title:first-child{margin-top:0}
  .craft-row{display:flex;align-items:center;gap:12px;padding:8px 12px;background:var(--bg-secondary);border-radius:6px;margin-bottom:6px}
  .craft-row img{width:32px;height:32px;object-fit:contain}
  .craft-row .craft-name{font-size:14px;color:var(--text-primary);flex:1}
  .craft-row .craft-amount{font-family:var(--font-heading);font-weight:700;font-size:15px;color:var(--accent)}
  .stat-grid-modal{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
  .stat-item{background:var(--bg-secondary);border-radius:6px;padding:10px 12px;text-align:center}
  .stat-item .stat-label{font-family:var(--font-condensed);font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)}
  .stat-item .stat-val{font-family:var(--font-heading);font-weight:700;font-size:18px;color:var(--text-primary);margin-top:2px}
  .craft-time{font-size:13px;color:var(--text-muted);margin-top:12px;display:flex;align-items:center;gap:6px}
  .craft-time em{color:var(--accent);font-style:normal;font-weight:600}
  .workbench-badge{display:inline-block;font-family:var(--font-condensed);font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:3px 10px;border-radius:4px;background:var(--bg-secondary);border:1px solid var(--border);color:var(--text-secondary);margin-top:8px}
  @media(max-width:600px){
    .item-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
    .item-card img{width:60px;height:60px}
    .modal-header{flex-direction:column;text-align:center;gap:12px}
    .stat-grid-modal{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>
<header class="top-bar">
  <a href="../index.html" class="logo"><div class="logo-icon">R</div>RUST<em>WIKI</em></a>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>
</header>
<div class="page">
  <div class="breadcrumb">
    <a href="../index.html">Home</a><span class="sep">/</span>
    <a href="../items.html">Items</a><span class="sep">/</span>
    <span>Electrical</span>
  </div>
  <div class="hero" style="padding:36px 24px 28px;">
    <h1><img src="https://rustlabs.com/img/items180/ceilinglight.png" style="width:48px;height:48px;object-fit:contain;vertical-align:middle;margin-right:8px"> <em>Electrical</em></h1>
    <p>All electrical components in Rust — generators, switches, lights, and circuits.</p>
  </div>
  <div class="section">
    <div class="item-grid" id="itemGrid"></div>
  </div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
<footer class="site-footer">
  <div class="footer-inner">

<script>
const IMG = 'https://rustlabs.com/img/items180';
const ITEMS = [{"n": "Solar Panel", "s": "electric.solarpanel.large", "desc": "Generates electricity from sunlight. Output varies with time of day.", "craft": [{"n": "High Quality Metal", "s": "metal.refined", "a": 5}, {"n": "Tech Trash", "s": "techparts", "a": 1}], "wb": 1, "time": 30}, {"n": "Small Battery", "s": "electric.battery.rechargable.small", "desc": "Stores a small amount of electricity. 10 rWm capacity.", "craft": [{"n": "High Quality Metal", "s": "metal.refined", "a": 2}], "wb": 1, "time": 10}, {"n": "Medium Battery", "s": "electric.battery.rechargable.medium", "desc": "Stores a moderate amount of electricity. 50 rWm capacity.", "craft": [{"n": "High Quality Metal", "s": "metal.refined", "a": 5}], "wb": 2, "time": 20}, {"n": "Large Battery", "s": "electric.battery.rechargable.large", "desc": "Stores a large amount of electricity. 100 rWm capacity.", "craft": [{"n": "High Quality Metal", "s": "metal.refined", "a": 10}], "wb": 2, "time": 30}, {"n": "Wind Turbine", "s": "generator.wind.scrap", "desc": "Generates electricity from wind. Variable output based on elevation and weather.", "craft": [{"n": "High Quality Metal", "s": "metal.refined", "a": 10}, {"n": "Gears", "s": "gears", "a": 3}, {"n": "Sheet Metal", "s": "sheetmetal", "a": 3}], "wb": 2, "time": 60}, {"n": "Small Generator", "s": "electric.generator.small", "desc": "Burns low grade fuel to generate electricity. Reliable but noisy.", "craft": [{"n": "High Quality Metal", "s": "metal.refined", "a": 5}, {"n": "Metal Fragments", "s": "metal.fragments", "a": 200}, {"n": "Gears", "s": "gears", "a": 2}], "wb": 2, "time": 30}, {"n": "Switch", "s": "electric.switch", "desc": "A manual on/off switch for electrical circuits.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 75}, {"n": "High Quality Metal", "s": "metal.refined", "a": 1}], "wb": 1, "time": 10}, {"n": "Splitter", "s": "electric.splitter", "desc": "Splits an electrical input into multiple outputs.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 50}, {"n": "High Quality Metal", "s": "metal.refined", "a": 1}], "wb": 1, "time": 10}, {"n": "Root Combiner", "s": "electrical.combiner", "desc": "Combines multiple electrical inputs into one output.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 50}, {"n": "High Quality Metal", "s": "metal.refined", "a": 1}], "wb": 1, "time": 10}, {"n": "Blocker", "s": "electric.blocker", "desc": "Blocks electrical passthrough when it receives a signal.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 75}, {"n": "High Quality Metal", "s": "metal.refined", "a": 1}], "wb": 1, "time": 10}, {"n": "AND Switch", "s": "electric.andswitch", "desc": "Passes electricity only when both inputs are active.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 75}, {"n": "High Quality Metal", "s": "metal.refined", "a": 1}], "wb": 1, "time": 10}, {"n": "OR Switch", "s": "electric.orswitch", "desc": "Passes electricity when either input is active.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 75}, {"n": "High Quality Metal", "s": "metal.refined", "a": 1}], "wb": 1, "time": 10}, {"n": "XOR Switch", "s": "electric.xorswitch", "desc": "Passes electricity when exactly one input is active.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 75}, {"n": "High Quality Metal", "s": "metal.refined", "a": 1}], "wb": 1, "time": 10}, {"n": "Timer", "s": "electric.timer", "desc": "Passes electricity for a set duration when triggered.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 75}, {"n": "High Quality Metal", "s": "metal.refined", "a": 1}], "wb": 1, "time": 10}, {"n": "Counter", "s": "electric.counter", "desc": "Counts passthrough events. Can trigger actions at set counts.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 75}, {"n": "High Quality Metal", "s": "metal.refined", "a": 1}], "wb": 1, "time": 10}, {"n": "RAND Switch", "s": "electric.random.switch", "desc": "Randomly passes or blocks electricity.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 75}, {"n": "High Quality Metal", "s": "metal.refined", "a": 1}], "wb": 1, "time": 10}, {"n": "HBHF Sensor", "s": "electric.hbhfsensor", "desc": "Detects heartbeats. Triggers output when a player is nearby.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 100}, {"n": "High Quality Metal", "s": "metal.refined", "a": 2}, {"n": "Tech Trash", "s": "techparts", "a": 1}], "wb": 2, "time": 20}, {"n": "Pressure Pad", "s": "electric.pressurepad", "desc": "Triggers when stepped on. Useful for automated doors and traps.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 75}, {"n": "High Quality Metal", "s": "metal.refined", "a": 1}], "wb": 1, "time": 10}, {"n": "RF Broadcaster", "s": "electric.rf.broadcaster", "desc": "Sends a radio signal on a specified frequency.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 100}, {"n": "High Quality Metal", "s": "metal.refined", "a": 2}], "wb": 1, "time": 15}, {"n": "RF Receiver", "s": "electric.rf.receiver", "desc": "Triggers when it receives a matching radio frequency.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 100}, {"n": "High Quality Metal", "s": "metal.refined", "a": 2}], "wb": 1, "time": 15}, {"n": "Ceiling Light", "s": "ceilinglight", "desc": "An electric ceiling light. Requires power to operate.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 50}, {"n": "Low Grade Fuel", "s": "lowgradefuel", "a": 15}], "wb": 1, "time": 15}, {"n": "Siren Light", "s": "electric.sirenlight", "desc": "A flashing siren light. Good for alarm systems.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 75}, {"n": "High Quality Metal", "s": "metal.refined", "a": 1}], "wb": 1, "time": 10}, {"n": "Search Light", "s": "searchlight", "desc": "A powerful directional spotlight. Can be controlled remotely.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 200}, {"n": "High Quality Metal", "s": "metal.refined", "a": 3}], "wb": 1, "time": 20}, {"n": "Simple Light", "s": "electric.simplelight", "desc": "A basic electric light for indoor use.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 25}], "wb": 0, "time": 5}, {"n": "Door Controller", "s": "electric.doorcontroller", "desc": "Allows doors to be opened and closed remotely via electricity.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 75}, {"n": "High Quality Metal", "s": "metal.refined", "a": 2}], "wb": 1, "time": 15}, {"n": "Igniter", "s": "electric.igniter", "desc": "Ignites nearby flammable items when powered.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 50}], "wb": 1, "time": 10}, {"n": "Powered Water Purifier", "s": "powered.water.purifier", "desc": "Purifies salt water into fresh water using electricity.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 100}, {"n": "High Quality Metal", "s": "metal.refined", "a": 2}, {"n": "Cloth", "s": "cloth", "a": 20}], "wb": 1, "time": 20}, {"n": "Sprinkler", "s": "electric.sprinkler", "desc": "Automatically waters nearby plants when powered.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 50}, {"n": "High Quality Metal", "s": "metal.refined", "a": 1}], "wb": 1, "time": 10}, {"n": "Smart Alarm", "s": "smart.alarm", "desc": "Sends notifications to your phone when triggered.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 75}, {"n": "High Quality Metal", "s": "metal.refined", "a": 2}, {"n": "Tech Trash", "s": "techparts", "a": 1}], "wb": 2, "time": 20}, {"n": "Smart Switch", "s": "smart.switch", "desc": "A switch that can be controlled remotely via the Rust+ app.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 75}, {"n": "High Quality Metal", "s": "metal.refined", "a": 2}, {"n": "Tech Trash", "s": "techparts", "a": 1}], "wb": 2, "time": 20}, {"n": "Storage Monitor", "s": "storage.monitor", "desc": "Monitors container contents remotely via Rust+ app.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 75}, {"n": "High Quality Metal", "s": "metal.refined", "a": 2}, {"n": "Tech Trash", "s": "techparts", "a": 1}], "wb": 2, "time": 20}, {"n": "Audio Alarm", "s": "electric.audioalarm", "desc": "Plays a loud alarm sound when powered. Good for raid alerts.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 75}, {"n": "High Quality Metal", "s": "metal.refined", "a": 1}], "wb": 1, "time": 10}, {"n": "Computer Station", "s": "computerstation", "desc": "A station for viewing CCTV cameras and controlling turrets remotely.", "craft": [{"n": "High Quality Metal", "s": "metal.refined", "a": 5}, {"n": "Metal Fragments", "s": "metal.fragments", "a": 200}, {"n": "Tech Trash", "s": "techparts", "a": 1}, {"n": "CCTV Camera", "s": "cctv.camera", "a": 1}], "wb": 2, "time": 45}, {"n": "Telephone", "s": "telephone", "desc": "Allows voice communication with other players who have phones.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 100}, {"n": "High Quality Metal", "s": "metal.refined", "a": 3}], "wb": 1, "time": 15}, {"n": "Elevator", "s": "elevator", "desc": "A vertical transport system for multi-floor bases. Requires power.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 200}, {"n": "High Quality Metal", "s": "metal.refined", "a": 5}, {"n": "Gears", "s": "gears", "a": 3}], "wb": 2, "time": 30}, {"n": "Industrial Conveyor", "s": "industrial.conveyor", "desc": "Moves items between containers automatically.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 100}, {"n": "High Quality Metal", "s": "metal.refined", "a": 3}, {"n": "Gears", "s": "gears", "a": 1}], "wb": 2, "time": 20}, {"n": "Industrial Splitter", "s": "industrial.splitter", "desc": "Splits item flow between multiple containers.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 100}, {"n": "High Quality Metal", "s": "metal.refined", "a": 3}, {"n": "Gears", "s": "gears", "a": 1}], "wb": 2, "time": 20}, {"n": "Tesla Coil", "s": "electric.teslacoil", "desc": "An electrical trap that zaps nearby players when powered. More power = more damage.", "craft": [{"n": "High Quality Metal", "s": "metal.refined", "a": 3}, {"n": "Tech Trash", "s": "techparts", "a": 1}], "wb": 1, "time": 30}];

const grid = document.getElementById('itemGrid');
const modal = document.getElementById('modal');

function esc(s){const d=document.createElement('span');d.textContent=s||'';return d.innerHTML}

function renderGrid(){
  grid.innerHTML = ITEMS.map(w =>
    '<div class="item-card" data-slug="'+w.s+'">' +
    '<img src="'+IMG+'/'+w.s+'.png" onerror="this.style.opacity=\'0.3\'" loading="lazy">' +
    '<div class="item-label">'+esc(w.n)+'</div></div>'
  ).join('');
}

function openModal(slug){
  const w = ITEMS.find(x=>x.s===slug);
  if(!w) return;
  const header = document.getElementById('modalHeader');
  const body = document.getElementById('modalBody');
  header.innerHTML =
    '<img src="'+IMG+'/'+w.s+'.png" onerror="this.style.opacity=\'0.3\'">' +
    '<div class="modal-header-text">' +
    '<h2>'+esc(w.n)+'</h2>' +
    '<div class="item-desc">'+esc(w.desc)+'</div>' +
    '</div>';
  let html = '';
  if(w.stats && w.stats.length){
    html += '<div class="modal-section-title">Stats</div><div class="stat-grid-modal">';
    w.stats.forEach(s => html += '<div class="stat-item"><div class="stat-label">'+s.l+'</div><div class="stat-val">'+s.v+'</div></div>');
    html += '</div>';
  }
  if(w.craft){
    html += '<div class="modal-section-title">Crafting Cost</div>';
    w.craft.forEach(c => {
      html += '<div class="craft-row">' +
        '<img src="'+IMG+'/'+c.s+'.png" onerror="this.style.opacity=\'0.3\'">' +
        '<span class="craft-name">'+esc(c.n)+'</span>' +
        '<span class="craft-amount">&times;'+c.a+'</span></div>';
    });
    if(w.time) html += '<div class="craft-time">⏱ Craft time: <em>'+w.time+'s</em></div>';
    if(w.wb!==undefined && w.wb!==null) html += '<div class="workbench-badge">Workbench Level '+w.wb+'</div>';
  } else {
    html += '<div class="modal-section-title">Crafting</div>';
    html += '<div style="color:var(--text-muted);font-size:13px;padding:8px 0;">'+esc(w.loot||'This item cannot be crafted. Found as loot.')+'</div>';
  }
  body.innerHTML = html;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(){modal.classList.remove('open');document.body.style.overflow='';}
grid.addEventListener('click', e => {const c=e.target.closest('.item-card');if(c)openModal(c.dataset.slug);});
modal.addEventListener('click', e => {if(e.target===modal)closeModal();});
document.addEventListener('keydown', e => {if(e.key==='Escape')closeModal();});
renderGrid();
</script>
</body>
</html>
