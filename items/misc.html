<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Misc &mdash; RustWiki</title>
<meta name="description" content="All misc in Rust — descriptions, crafting costs, and detailed information.">
<link rel="stylesheet" href="../css/style.css">
<style>
  .item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  .item-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px 12px;text-align:center;cursor:pointer;transition:all .2s;text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:center;gap:8px}
  .item-card:hover{border-color:var(--accent);background:var(--bg-card-hover);transform:translateY(-2px)}
  .item-card img{width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3))}
  .item-card .item-label{font-family:var(--font-heading);font-size:13px;font-weight:600;color:var(--text-primary);line-height:1.2}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:modalIn .25s ease}
  @keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
  .modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text-muted);font-size:24px;cursor:pointer;z-index:1;line-height:1;padding:4px 8px;border-radius:4px;transition:all .15s}
  .modal-close:hover{color:var(--accent);background:var(--bg-secondary)}
  .modal-header{display:flex;align-items:center;gap:20px;padding:28px 28px 0;border-bottom:1px solid var(--border);padding-bottom:20px}
  .modal-header img{width:100px;height:100px;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
  .modal-header-text h2{font-family:var(--font-heading);font-size:22px;color:var(--text-primary);margin:0}
  .modal-header-text .item-type{font-family:var(--font-condensed);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-top:4px}
  .modal-header-text .item-desc{font-size:13px;color:var(--text-muted);margin-top:8px;line-height:1.5}
  .modal-body{padding:20px 28px 28px}
  .modal-section-title{font-family:var(--font-condensed);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:10px;margin-top:20px}
  .modal-section-title:first-child{margin-top:0}
  .craft-row{display:flex;align-items:center;gap:12px;padding:8px 12px;background:var(--bg-secondary);border-radius:6px;margin-bottom:6px}
  .craft-row img{width:32px;height:32px;object-fit:contain}
  .craft-row .craft-name{font-size:14px;color:var(--text-primary);flex:1}
  .craft-row .craft-amount{font-family:var(--font-heading);font-weight:700;font-size:15px;color:var(--accent)}
  .stat-grid-modal{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
  .stat-item{background:var(--bg-secondary);border-radius:6px;padding:10px 12px;text-align:center}
  .stat-item .stat-label{font-family:var(--font-condensed);font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)}
  .stat-item .stat-val{font-family:var(--font-heading);font-weight:700;font-size:18px;color:var(--text-primary);margin-top:2px}
  .craft-time{font-size:13px;color:var(--text-muted);margin-top:12px;display:flex;align-items:center;gap:6px}
  .craft-time em{color:var(--accent);font-style:normal;font-weight:600}
  .workbench-badge{display:inline-block;font-family:var(--font-condensed);font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:3px 10px;border-radius:4px;background:var(--bg-secondary);border:1px solid var(--border);color:var(--text-secondary);margin-top:8px}
  @media(max-width:600px){
    .item-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
    .item-card img{width:60px;height:60px}
    .modal-header{flex-direction:column;text-align:center;gap:12px}
    .stat-grid-modal{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>
<header class="top-bar">
  <a href="../index.html" class="logo"><div class="logo-icon">R</div>RUST<em>WIKI</em></a>
  <nav class="top-nav" id="nav">
    <a href="../index.html">Home</a>
    <a href="../items.html" class="active">Items</a>
    <a href="../skins.html">Skins</a>
    <a href="../servers.html">Servers</a>
  </nav>
  <button class="mobile-toggle" onclick="document.getElementById('nav').classList.toggle('open')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>
</header>
<div class="page">
  <div class="breadcrumb">
    <a href="../index.html">Home</a><span class="sep">/</span>
    <a href="../items.html">Items</a><span class="sep">/</span>
    <span>Misc</span>
  </div>
  <div class="hero" style="padding:36px 24px 28px;">
    <h1><img src="https://rustlabs.com/img/items180/supply.signal.png" style="width:48px;height:48px;object-fit:contain;vertical-align:middle;margin-right:8px"> <em>Misc</em></h1>
    <p>Miscellaneous items in Rust — signals, explosives, utility, and more.</p>
  </div>
  <div class="section">
    <div class="item-grid" id="itemGrid"></div>
  </div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-copy">&copy; 2026 RustWiki &mdash; Not affiliated with Facepunch Studios</div>
    <div class="footer-links">
      <a href="../index.html">Home</a>
      <a href="../items.html">Items</a>
      <a href="../skins.html">Skins</a>
      <a href="../servers.html">Servers</a>
    </div>
  </div>
</footer>
<script>
const IMG = 'https://rustlabs.com/img/items180';
const ITEMS = [{"n": "Supply Signal", "s": "supply.signal", "desc": "A throwable smoke signal that calls in an airdrop. Highly valuable.", "loot": "Found in locked crates, helicopter crates, and military crates."}, {"n": "Note", "s": "note", "desc": "A writable note. Can be left for other players to read.", "craft": [{"n": "Wood", "s": "wood", "a": 5}], "wb": 0, "time": 1}, {"n": "Paper Map", "s": "map", "desc": "A physical map of the island.", "craft": [{"n": "Wood", "s": "wood", "a": 5}], "wb": 0, "time": 2}, {"n": "Small Backpack", "s": "smallbackpack", "desc": "A wearable backpack that increases inventory slots.", "craft": [{"n": "Cloth", "s": "cloth", "a": 100}, {"n": "Leather", "s": "leather", "a": 50}, {"n": "Sewing Kit", "s": "sewingkit", "a": 3}], "wb": 1, "time": 30}, {"n": "Large Backpack", "s": "largebackpack", "desc": "A larger backpack providing additional inventory space.", "craft": [{"n": "Cloth", "s": "cloth", "a": 200}, {"n": "Leather", "s": "leather", "a": 100}, {"n": "Sewing Kit", "s": "sewingkit", "a": 5}, {"n": "Tarp", "s": "tarp", "a": 2}], "wb": 2, "time": 45}, {"n": "Key", "s": "key", "desc": "A physical key for key locks. Can be lost on death."}, {"n": "Blue Keycard", "s": "keycard_blue", "desc": "Opens blue keycard doors at monuments. First tier of the keycard puzzle chain.", "loot": "Found at tier 1 monuments."}, {"n": "Green Keycard", "s": "keycard_green", "desc": "Opens green keycard doors at monuments. Second tier of the puzzle chain.", "loot": "Found behind blue keycard doors."}, {"n": "Red Keycard", "s": "keycard_red", "desc": "Opens red keycard doors at monuments. Final tier with the best loot.", "loot": "Found behind green keycard doors."}, {"n": "Chinese Lantern", "s": "chineselantern", "desc": "A decorative hanging lantern.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 25}, {"n": "Low Grade Fuel", "s": "lowgradefuel", "a": 10}], "wb": 0, "time": 10}, {"n": "Smoke Grenade", "s": "grenade.smoke", "desc": "Creates a smoke screen. Useful for cover during firefights.", "craft": [{"n": "Metal Fragments", "s": "metal.fragments", "a": 25}, {"n": "Gunpowder", "s": "gunpowder", "a": 20}, {"n": "Cloth", "s": "cloth", "a": 5}], "wb": 1, "time": 10}, {"n": "Kayak", "s": "kayak", "desc": "A small watercraft for coastal travel. Fits one player.", "loot": "Found at fishing villages."}, {"n": "Small Wooden Sign", "s": "sign.wooden.small", "desc": "A small paintable sign for marking your base or leaving messages.", "craft": [{"n": "Wood", "s": "wood", "a": 100}], "wb": 0, "time": 10}, {"n": "Large Wooden Sign", "s": "sign.wooden.large", "desc": "A large paintable sign.", "craft": [{"n": "Wood", "s": "wood", "a": 300}], "wb": 0, "time": 15}, {"n": "Twig", "s": "wood", "desc": "The weakest building material tier. Can be destroyed by any tool."}, {"n": "Survey Charge", "s": "surveycharge", "desc": "Thrown on the ground to check for underground resources for quarries.", "craft": [{"n": "Gunpowder", "s": "gunpowder", "a": 20}, {"n": "Metal Fragments", "s": "metal.fragments", "a": 20}], "wb": 1, "time": 5}, {"n": "Targeting Computer", "s": "targeting.computer", "desc": "A component used to craft auto turrets.", "loot": "Found in elite crates and recycled from CCTV cameras."}];

const grid = document.getElementById('itemGrid');
const modal = document.getElementById('modal');

function esc(s){const d=document.createElement('span');d.textContent=s||'';return d.innerHTML}

function renderGrid(){
  grid.innerHTML = ITEMS.map(w =>
    '<div class="item-card" data-slug="'+w.s+'">' +
    '<img src="'+IMG+'/'+w.s+'.png" onerror="this.style.opacity=\'0.3\'" loading="lazy">' +
    '<div class="item-label">'+esc(w.n)+'</div></div>'
  ).join('');
}

function openModal(slug){
  const w = ITEMS.find(x=>x.s===slug);
  if(!w) return;
  const header = document.getElementById('modalHeader');
  const body = document.getElementById('modalBody');
  header.innerHTML =
    '<img src="'+IMG+'/'+w.s+'.png" onerror="this.style.opacity=\'0.3\'">' +
    '<div class="modal-header-text">' +
    '<h2>'+esc(w.n)+'</h2>' +
    '<div class="item-desc">'+esc(w.desc)+'</div>' +
    '</div>';
  let html = '';
  if(w.stats && w.stats.length){
    html += '<div class="modal-section-title">Stats</div><div class="stat-grid-modal">';
    w.stats.forEach(s => html += '<div class="stat-item"><div class="stat-label">'+s.l+'</div><div class="stat-val">'+s.v+'</div></div>');
    html += '</div>';
  }
  if(w.craft){
    html += '<div class="modal-section-title">Crafting Cost</div>';
    w.craft.forEach(c => {
      html += '<div class="craft-row">' +
        '<img src="'+IMG+'/'+c.s+'.png" onerror="this.style.opacity=\'0.3\'">' +
        '<span class="craft-name">'+esc(c.n)+'</span>' +
        '<span class="craft-amount">&times;'+c.a+'</span></div>';
    });
    if(w.time) html += '<div class="craft-time">⏱ Craft time: <em>'+w.time+'s</em></div>';
    if(w.wb!==undefined && w.wb!==null) html += '<div class="workbench-badge">Workbench Level '+w.wb+'</div>';
  } else {
    html += '<div class="modal-section-title">Crafting</div>';
    html += '<div style="color:var(--text-muted);font-size:13px;padding:8px 0;">'+esc(w.loot||'This item cannot be crafted. Found as loot.')+'</div>';
  }
  body.innerHTML = html;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(){modal.classList.remove('open');document.body.style.overflow='';}
grid.addEventListener('click', e => {const c=e.target.closest('.item-card');if(c)openModal(c.dataset.slug);});
modal.addEventListener('click', e => {if(e.target===modal)closeModal();});
document.addEventListener('keydown', e => {if(e.key==='Escape')closeModal();});
renderGrid();
</script>
</body>
</html>
